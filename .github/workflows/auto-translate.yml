name: Auto-translate and prerender CMS content

on:
  push:
    branches: [main]
    paths:
      - "data/*.json"

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    # Prevent the bot's own commit from re-triggering this workflow.
    if: "!contains(github.event.head_commit.message, '[skip translate]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fill in missing translations
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: node scripts/auto-translate.js

      - name: Prerender litters/gallery/team/news into static HTML
        run: node scripts/prerender.js

      - name: Commit translated content and prerendered pages
        run: |
          git config user.name "stelli-translate-bot"
          git config user.email "actions@github.com"
          git add data/*.json \
            index.html kotatka.html fotogalerie.html o-nas.html tym.html \
            en/index.html en/kotatka.html en/fotogalerie.html en/o-nas.html en/tym.html \
            de/index.html de/kotatka.html de/fotogalerie.html de/o-nas.html de/tym.html \
            pl/index.html pl/kotatka.html pl/fotogalerie.html pl/o-nas.html pl/tym.html
          if ! git diff --cached --quiet; then
            git commit -m "Auto-translate and prerender CMS content [skip translate]"
            git push
          else
            echo "Nothing to translate or prerender — no commit needed."
          fi
