backend:
  name: github
  repo: miguns/stelli-website
  branch: main
  base_url: https://stelliragdoll.cz
  auth_endpoint: api/auth

media_folder: "images/uploads"
public_folder: "images/uploads"

collections:
  - name: "news"
    label: "Novinky (banner na úvodu)"
    files:
      - file: "data/news.json"
        label: "Banner novinek"
        name: "news"
        fields:
          - { label: "Zobrazit banner na webu", name: "enabled", widget: "boolean", default: true }
          - { label: "Nadpis (čeština)", name: "title_cs", widget: "string" }
          - { label: "Nadpis (English)", name: "title_en", widget: "string" }
          - { label: "Nadpis (Deutsch)", name: "title_de", widget: "string" }
          - { label: "Nadpis (Polski)", name: "title_pl", widget: "string" }
          - { label: "Text (čeština)", name: "text_cs", widget: "string" }
          - { label: "Text (English)", name: "text_en", widget: "string" }
          - { label: "Text (Deutsch)", name: "text_de", widget: "string" }
          - { label: "Text (Polski)", name: "text_pl", widget: "string" }
          - { label: "Text tlačítka (čeština)", name: "cta_cs", widget: "string" }
          - { label: "Text tlačítka (English)", name: "cta_en", widget: "string" }
          - { label: "Text tlačítka (Deutsch)", name: "cta_de", widget: "string" }
          - { label: "Text tlačítka (Polski)", name: "cta_pl", widget: "string" }

  - name: "litters"
    label: "Vrhy koťátek"
    files:
      - file: "data/litters.json"
        label: "Vrhy"
        name: "litters"
        fields:
          - label: "Vrhy"
            name: "litters"
            widget: "list"
            summary: "{{fields.name_cs}}"
            fields:
              - { label: "ID (jen malá písmena, bez diakritiky, pomlčky)", name: "id", widget: "string", hint: "např. vrh-d — musí být pro každý vrh jedinečné" }
              - { label: "Název (čeština)", name: "name_cs", widget: "string" }
              - { label: "Název (English)", name: "name_en", widget: "string" }
              - { label: "Název (Deutsch)", name: "name_de", widget: "string" }
              - { label: "Název (Polski)", name: "name_pl", widget: "string" }
              - label: "Stav vrhu"
                name: "status"
                widget: "select"
                options:
                  - { label: "Dostupné", value: "available" }
                  - { label: "Rezervováno", value: "reserved" }
                  - { label: "V nových domovech", value: "home" }
                  - { label: "Připravujeme (bez fotek)", value: "upcoming" }
              - { label: "Popis (čeština)", name: "desc_cs", widget: "text" }
              - { label: "Popis (English)", name: "desc_en", widget: "text" }
              - { label: "Popis (Deutsch)", name: "desc_de", widget: "text" }
              - { label: "Popis (Polski)", name: "desc_pl", widget: "text" }
              - label: "Fotky vrhu"
                name: "photos"
                widget: "list"
                field: { label: "Fotka", name: "photo", widget: "image" }

  - name: "team"
    label: "Náš tým koček"
    files:
      - file: "data/team.json"
        label: "Tým"
        name: "team"
        fields:
          - label: "Chovné kočky (dámy)"
            name: "queens"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Jméno", name: "name", widget: "string" }
              - { label: "Barva / rodokmen", name: "desc", widget: "string" }
              - { label: "Fotka", name: "photo", widget: "image" }
          - label: "Chovní kocouři (páni)"
            name: "studs"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Jméno", name: "name", widget: "string" }
              - { label: "Barva / rodokmen", name: "desc", widget: "string" }
              - { label: "Fotka", name: "photo", widget: "image" }

  - name: "gallery"
    label: "Fotogalerie"
    files:
      - file: "data/gallery.json"
        label: "Fotogalerie"
        name: "gallery"
        fields:
          - label: "Fotky"
            name: "photos"
            widget: "list"
            field: { label: "Fotka", name: "photo", widget: "image" }

  - name: "onas-life"
    label: "O nás — fotky ze života"
    files:
      - file: "data/onas-life.json"
        label: "Kousek domova StElli"
        name: "onas-life"
        fields:
          - label: "Fotky"
            name: "photos"
            widget: "list"
            field: { label: "Fotka", name: "photo", widget: "image" }

  - name: "testimonials"
    label: "Ohlasy nových domovů (Naše práce)"
    files:
      - file: "data/testimonials.json"
        label: "Ohlasy"
        name: "testimonials"
        fields:
          - label: "Ohlasy"
            name: "items"
            widget: "list"
            summary: "{{fields.caption_cs}}"
            fields:
              - { label: "Fotka", name: "photo", widget: "image" }
              - { label: "Text (čeština)", name: "caption_cs", widget: "text" }
              - { label: "Text (English)", name: "caption_en", widget: "text", required: false }
              - { label: "Text (Deutsch)", name: "caption_de", widget: "text", required: false }
              - { label: "Text (Polski)", name: "caption_pl", widget: "text", required: false }
