  <path d="M 260 310 Q 320 300 330 220" stroke="#c8b8d8" stroke-width="25" fill="none" stroke-linecap="round"/>
  <!-- tlapky -->
  <ellipse cx="170" cy="370" rx="20" ry="35" fill="#c8b8d8"/>
  <ellipse cx="230" cy="370" rx="20" ry="35" fill="#c8b8d8"/>
  <text x="200" y="450" font-size="20" fill="#8b7ba8" text-anchor="middle" font-weight="bold">StElli Ragdoll</text>
