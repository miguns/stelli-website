<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d4f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5e6ef;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <!-- hlava -->
  <circle cx="200" cy="180" r="70" fill="#c8b8d8"/>
  <!-- uši -->
  <polygon points="160,120 140,80 170,110" fill="#c8b8d8"/>
  <polygon points="240,120 260,80 230,110" fill="#c8b8d8"/>
  <polygon points="160,120 150,95 165,115" fill="#e8a0b0"/>
  <polygon points="240,120 250,95 235,115" fill="#e8a0b0"/>
  <!-- oči -->
  <circle cx="175" cy="165" r="12" fill="#4a90e2"/>
  <circle cx="225" cy="165" r="12" fill="#4a90e2"/>
  <circle cx="177" cy="163" r="5" fill="white"/>
  <circle cx="227" cy="163" r="5" fill="white"/>
  <!-- nos -->
  <polygon points="200,190 195,200 205,200" fill="#e8a0b0"/>
  <!-- ústa -->
  <path d="M 200 200 Q 190 210 180 205" stroke="#999" stroke-width="2" fill="none"/>
  <path d="M 200 200 Q 210 210 220 205" stroke="#999" stroke-width="2" fill="none"/>
  <!-- tělo -->
  <ellipse cx="200" cy="300" rx="60" ry="80" fill="#c8b8d8"/>
